<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로컬 퀴즈쇼</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f8f9fa; margin: 0; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        #user-list-container { background: white; border: 1px solid #ddd; max-height: 150px; overflow-y: auto; margin: 20px auto; width: 80%; padding: 10px; border-radius: 10px; }
        .btn-choice { width: 100%; padding: 20px; margin: 10px 0; font-size: 1.1rem; border: none; border-radius: 15px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .btn-choice:active { transform: scale(0.98); background: #e2e2e2; }
        #question-text { font-size: 1.4rem; font-weight: bold; margin-bottom: 20px; word-break: keep-all; }
    </style>
</head>
<body>

    <div id="screen-intro" class="screen active">
        <h1>🎮 퀴즈 서바이벌</h1>
        <button onclick="changeScreen('screen-nickname')" style="padding:15px 30px; background:#4a90e2; color:white; border:none; border-radius:10px;">시작하기</button>
    </div>

    <div id="screen-nickname" class="screen">
        <h2>닉네임 입력</h2>
        <input type="text" id="nickname-input" placeholder="닉네임" autocomplete="off">
        <button onclick="joinWaitingRoom()" style="margin-top:20px; padding:10px 20px;">대기실 입장</button>
    </div>

    <div id="screen-waiting" class="screen">
        <h2>대기실</h2>
        <p>접속자: <span id="count-num">0</span>명</p>
        <div id="user-list-container"><div id="user-list"></div></div>
        <p>방장이 게임을 시작할 때까지 대기...</p>
        <hr>
        <input type="password" id="host-pw" placeholder="비번" style="width:60px">
        <button onclick="nextStep()" style="background:green; color:white; border:none; padding:5px 10px;">게임 시작 / 다음 문제</button>
    </div>

    <div id="screen-quiz" class="screen">
        <div id="question-text">문제를 불러오는 중...</div>
        <div id="choices-area">
            <button class="btn-choice" onclick="sendAnswer(0)"></button>
            <button class="btn-choice" onclick="sendAnswer(1)"></button>
            <button class="btn-choice" onclick="sendAnswer(2)"></button>
            <button class="btn-choice" onclick="sendAnswer(3)"></button>
        </div>
        <p id="wait-msg" style="display:none; color:blue;">정답 제출 완료! 다음 문제를 기다리세요.</p>
    </div>

    <div id="screen-result" class="screen">
        <h1>🏆 최종 순위</h1>
        <div id="rank-list"></div>
        <button onclick="location.reload()" style="margin-top:20px;">처음으로 돌아가기</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function changeScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function joinWaitingRoom() {
            const nick = document.getElementById('nickname-input').value;
            if(!nick) return alert("닉네임!");
            socket.emit('join_waiting_room', nick);
            changeScreen('screen-waiting');
        }

        function nextStep() {
            const pw = document.getElementById('host-pw').value;
            socket.emit('request_start', pw);
        }

        function sendAnswer(idx) {
            socket.emit('submit_answer', idx);
            document.getElementById('choices-area').style.display = 'none';
            document.getElementById('wait-msg').style.display = 'block';
        }

        socket.on('update_user_list', (users) => {
            document.getElementById('count-num').innerText = users.length;
            document.getElementById('user-list').innerHTML = users.map(u => `<div>${u}</div>`).join('');
        });

        socket.on('next_question', (data) => {
            changeScreen('screen-quiz');
            document.getElementById('choices-area').style.display = 'block';
            document.getElementById('wait-msg').style.display = 'none';
            document.getElementById('question-text').innerText = `${data.index + 1}. ${data.q}`;
            const btns = document.querySelectorAll('.btn-choice');
            data.a.forEach((choice, i) => {
                btns[i].innerText = choice;
            });
        });

        socket.on('game_over', (ranks) => {
            changeScreen('screen-result');
            document.getElementById('rank-list').innerHTML = ranks.map((r, i) => 
                `<div>${i+1}등: ${r.nickname} (${r.score}점)</div>`
            ).join('');
        });

        socket.on('error_msg', (m) => alert(m));
    </script>
</body>
</html>
