<!DOCTYPE html>
<html lang="ko"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로컬 퀴즈쇼</title>
    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 0; }
        .screen { display: none; padding: 30px 20px; }
        .active { display: block; }
        
        /* 유저 리스트 스타일 */
        #user-list-container { 
            background: white; border-radius: 10px; border: 1px solid #ddd;
            max-height: 200px; overflow-y: auto; /* 세로 스크롤 */
            margin: 20px auto; width: 80%; padding: 10px;
        }
        .user-item { padding: 8px; border-bottom: 1px solid #eee; font-weight: bold; color: #333; }
        .user-item:last-child { border-bottom: none; }

        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border-radius: 10px; border:none; background: #4a90e2; color: white; margin-top: 10px; width: 100%; max-width: 300px; }
        input { padding: 12px; font-size: 1.1rem; border-radius: 5px; border: 1px solid #ccc; width: 80%; max-width: 280px; }
    </style>
</head>
<body>

    <div id="screen-intro" class="screen active">
        <h1>🎮 퀴즈 서바이벌</h1>
        <button onclick="changeScreen('screen-nickname')">참여하기</button>
    </div>

    <div id="screen-nickname" class="screen">
        <h2>닉네임을 입력하세요</h2>
        <input type="text" id="nickname-input" placeholder="한글/영문 닉네임" autocomplete="off" spellcheck="false">
        <br>
        <button onclick="joinWaitingRoom()">대기실 입장</button>
    </div>

    <div id="screen-waiting" class="screen">
        <h2>대기실</h2>
        <p>현재 접속자: <span id="count-num" style="color:red; font-weight:bold;">0</span>명</p>
        
        <div id="user-list-container">
            <div id="user-list">
                </div>
        </div>

        <p>방장의 시작을 기다리는 중...</p>
        <hr>
        <div style="background: #eee; padding: 15px; border-radius: 10px;">
            <p style="margin:0 0 10px 0;">방장 메뉴</p>
            <input type="password" id="host-pw" placeholder="비밀번호" style="width:100px; font-size:0.8rem;">
            <button onclick="startQuiz()" style="background:#27ae60; padding: 8px 15px; font-size:0.9rem; width:auto;">게임 시작</button>
        </div>
    </div>

    <div id="screen-quiz" class="screen">
        <h1>🚀 퀴즈 시작!</h1>
        <p>화면을 주목해주세요.</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        function changeScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function joinWaitingRoom() {
            const nick = document.getElementById('nickname-input').value;
            if(!nick) return alert("닉네임을 입력해주세요!");
            socket.emit('join_waiting_room', nick);
            changeScreen('screen-waiting');
        }

        function startQuiz() {
            const pw = document.getElementById('host-pw').value;
            socket.emit('request_start', pw);
        }

        // 서버로부터 유저 목록 업데이트 수신
        socket.on('update_user_list', (userArray) => {
            const listDiv = document.getElementById('user-list');
            const countSpan = document.getElementById('count-num');
            
            countSpan.innerText = userArray.length;
            listDiv.innerHTML = ''; // 기존 목록 초기화

            userArray.forEach(name => {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerText = name;
                listDiv.appendChild(div);
            });

            // 새 유저가 오면 자동으로 리스트 맨 아래로 스크롤
            const container = document.getElementById('user-list-container');
            container.scrollTop = container.scrollHeight;
        });

        socket.on('game_started', () => changeScreen('screen-quiz'));
        socket.on('error_msg', (msg) => alert(msg));
    </script>
</body>
</html>
